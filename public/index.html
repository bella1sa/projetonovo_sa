<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMatch | Explore</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold text-indigo-600 tracking-tight">BookMatch</a>
            <div class="flex gap-6 font-medium text-slate-600">
                <a href="index.html" class="hover:text-indigo-600 text-indigo-600">Explorar</a>
                <a href="chat.html" class="hover:text-indigo-600">Assistente</a>
                <a href="perfil.html" class="hover:text-indigo-600">Meu Perfil</a>
            </div>
        </div>
    </nav>

    <header class="bg-white py-16 px-4 border-b">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-6">Qual será sua próxima <span class="text-indigo-600">grande história?</span></h1>
            <div class="relative max-w-xl mx-auto">
                <input type="text" id="search-input" placeholder="Busque por título, autor ou gênero..." 
                    class="w-full pl-6 pr-12 py-4 rounded-full border-2 border-slate-100 focus:border-indigo-500 outline-none transition-all shadow-sm">
                <span class="absolute right-5 top-4 text-slate-400">🔍</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <h2 class="text-xl font-bold mb-8 flex items-center gap-2">
            <span class="w-2 h-8 bg-indigo-600 rounded-full"></span>
            Livros em Destaque
        </h2>

        <div id="book-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

   <script>
    const grid = document.getElementById('book-grid');
    const searchInput = document.getElementById('search-input');

    async function searchBooks(query = '') {
        grid.innerHTML = '<p class="col-span-full text-center text-slate-500">Buscando livros no servidor...</p>';
        
        try {
            // Buscando da nossa própria API Express!
            const response = await fetch(`/api/livros?q=${encodeURIComponent(query)}`);
            const livros = await response.json();
            
            if (livros.length > 0) {
                renderBooks(livros);
            } else {
                grid.innerHTML = '<p class="col-span-full text-center text-slate-500">Nenhum livro encontrado.</p>';
            }
        } catch (error) {
            grid.innerHTML = '<p class="col-span-full text-center text-red-500">Erro ao conectar com o servidor local.</p>';
        }
    }

    function renderBooks(books) {
        grid.innerHTML = books.map(livro => `
            <div class="group bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all border border-slate-100 cursor-pointer" 
                 onclick="window.location.href='livro.html?id=${livro.id}'">
                <div class="h-64 bg-slate-100 flex items-center justify-center overflow-hidden">
                    <img src="${livro.capa}" class="h-full object-cover group-hover:scale-110 transition-transform">
                </div>
                <div class="p-4">
                    <span class="text-xs font-bold text-indigo-500 uppercase">${livro.genero}</span>
                    <h3 class="font-bold text-slate-800 truncate">${livro.titulo}</h3>
                    <p class="text-slate-500 text-sm">${livro.autor}</p>
                </div>
            </div>`).join('');
    }

    let timer;
    searchInput.addEventListener('input', (e) => {
        clearTimeout(timer);
        timer = setTimeout(() => searchBooks(e.target.value), 300);
    });

    searchBooks();
</script>
</body>
</html>
