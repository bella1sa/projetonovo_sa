<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMatch | Explore</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold text-indigo-600 tracking-tight">BookMatch</a>
            <div class="flex gap-6 font-medium text-slate-600">
                <a href="index.html" class="hover:text-indigo-600 text-indigo-600">Explorar</a>
                <a href="chat.html" class="hover:text-indigo-600">Assistente</a>
                <a href="perfil.html" class="hover:text-indigo-600">Meu Perfil</a>
            </div>
        </div>
    </nav>

    <header class="bg-white py-16 px-4 border-b">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-6">Qual será sua próxima <span class="text-indigo-600">grande história?</span></h1>
            <div class="relative max-w-xl mx-auto">
                <input type="text" id="search-input" placeholder="Busque por título, autor ou gênero..." 
                    class="w-full pl-6 pr-12 py-4 rounded-full border-2 border-slate-100 focus:border-indigo-500 outline-none transition-all shadow-sm">
                <span class="absolute right-5 top-4 text-slate-400">🔍</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <h2 class="text-xl font-bold mb-8 flex items-center gap-2">
            <span class="w-2 h-8 bg-indigo-600 rounded-full"></span>
            Livros em Destaque
        </h2>

        <div id="book-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

   <script>
    const grid = document.getElementById('book-grid');
    const searchInput = document.getElementById('search-input');

    async function searchBooks(query = 'livros lidos') {
        grid.innerHTML = '<p class="col-span-full text-center text-slate-500">Buscando livros...</p>';
        
        try {
            const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=12`);
            
            // Se der erro 429 (Muitos pedidos), tentamos usar o que está guardado no cache
            if (response.status === 429) {
                console.warn("Limite da API atingido. Usando cache local.");
                const cache = JSON.parse(localStorage.getItem('ultimo_search_cache'));
                if (cache) {
                    renderBooks(cache);
                    return;
                }
                throw new Error("O Google Books está temporariamente ocupado. Tente novamente em 1 minuto.");
            }

            const data = await response.json();
            
            if (data.items) {
                // Guardamos no localStorage para o site não ficar vazio se der erro depois
                localStorage.setItem('ultimo_search_cache', JSON.stringify(data.items));
                renderBooks(data.items);
            } else {
                grid.innerHTML = '<p class="col-span-full text-center text-slate-500">Nenhum livro encontrado.</p>';
            }
        } catch (error) {
            grid.innerHTML = `<div class="col-span-full text-center p-10 bg-amber-50 rounded-xl border border-amber-200">
                <p class="text-amber-700 font-bold">Aviso do Sistema</p>
                <p class="text-amber-600 text-sm">${error.message}</p>
            </div>`;
        }
    }

    function renderBooks(books) {
        grid.innerHTML = books.map(item => {
            const info = item.volumeInfo;
            const id = item.id;
            const capa = info.imageLinks ? info.imageLinks.thumbnail.replace('http:', 'https:') : 'https://via.placeholder.com/150x220?text=Sem+Capa';
            
            return `
                <div class="group bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all border border-slate-100 cursor-pointer" 
                     onclick="window.location.href='livro.html?id=${id}'">
                    <div class="h-64 bg-slate-100 flex items-center justify-center overflow-hidden">
                        <img src="${capa}" class="h-full w-full object-contain p-2 group-hover:scale-110 transition-transform">
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-slate-800 truncate">${info.title}</h3>
                        <p class="text-slate-500 text-sm">${info.authors ? info.authors[0] : 'Autor desconhecido'}</p>
                    </div>
                </div>`;
        }).join('');
    }

    let timer;
    searchInput.addEventListener('input', (e) => {
        clearTimeout(timer);
        timer = setTimeout(() => searchBooks(e.target.value || 'livros lidos'), 800);
    });

    searchBooks();
</script>
</body>
</html>
