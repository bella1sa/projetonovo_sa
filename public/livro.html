<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Detalhes do Livro</title>
</head>
<body class="bg-slate-50 p-8">
    <nav class="max-w-4xl mx-auto mb-8">
        <a href="index.html" class="text-indigo-600 font-bold">← Voltar para a busca</a>
    </nav>

    <main class="max-w-4xl mx-auto bg-white p-8 rounded-3xl shadow-sm border">
        <div class="flex flex-col md:flex-row gap-8">
            <img id="book-capa" src="https://via.placeholder.com/200x300" class="w-48 rounded-lg shadow">
            <div>
                <h1 id="book-titulo" class="text-3xl font-bold text-slate-800">Carregando...</h1>
                <p id="book-autor" class="text-xl text-slate-500 mb-4"></p>
                <div id="book-sinopse" class="text-slate-600 text-sm leading-relaxed mb-6"></div>
            </div>
        </div>

        <div class="mt-10 border-t pt-8">
            <h3 class="font-bold text-lg mb-4">Sua Resenha</h3>
            <textarea id="comentario" class="w-full border p-4 rounded-xl h-32 outline-none focus:ring-2 ring-indigo-500" placeholder="O que achou deste livro?"></textarea>
            <button onclick="salvarResenha()" class="mt-4 bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all">
                Salvar no Servidor
            </button>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bookId = params.get('id');

        // Carregar os dados do Google
        async function carregarDados() {
            if (!bookId) return;
            try {
                const res = await fetch(`https://www.googleapis.com/books/v1/volumes/${bookId}`);
                const data = await res.json();
                const info = data.volumeInfo;

                document.getElementById('book-titulo').innerText = info.title;
                document.getElementById('book-autor').innerText = info.authors?.join(', ') || 'Autor desconhecido';
                document.getElementById('book-sinopse').innerHTML = info.description || 'Sem sinopse.';
                document.getElementById('book-capa').src = info.imageLinks?.thumbnail.replace('http:', 'https:') || '';
            } catch (e) {
                console.error("Erro ao buscar dados do Google");
            }
        }

        // SALVAR NO BACKEND (Express)
        async function salvarResenha() {
            const texto = document.getElementById('comentario').value;
            const titulo = document.getElementById('book-titulo').innerText;

            if (!texto.trim()) return alert("Escreva algo antes de salvar!");

            const dadosParaEnviar = {
                bookId: bookId,
                titulo: titulo,
                texto: texto,
                data: new Date().toLocaleDateString()
            };

            try {
                const response = await fetch('/api/resenhas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosParaEnviar)
                });

                if (response.ok) {
                    alert("Sucesso! Resenha salva no arquivo resenhas.json");
                    window.location.href = 'perfil.html';
                }
            } catch (error) {
                alert("Erro: O servidor (node server.js) está rodando?");
            }
        }

        carregarDados();
    </script>
</body>
</html>
